name: Python CI Pipeline

# این پایپ‌لاین با هر پوش (Push) روی شاخه‌های اصلی اجرا می‌شود
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # ۱. دریافت کدهای پروژه از مخزن
    - name: Checkout Code
      uses: actions/checkout@v3

    # ۲. راه‌اندازی محیط پایتون نسخه ۳.۱۰
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    # ۳. نصب کتابخانه‌های مورد نیاز (فست‌اِی‌پی‌آی و پای‌تست)
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn pydantic pytest httpx

    # ۴. اجرای خودکار تست‌ها
    - name: Run Unit Tests
      run: |
        python -m pytest src/test/test_main.py -v
